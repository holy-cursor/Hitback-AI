<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticating — HitBack</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="hitback-api" content="https://api.hitback.xyz">
  <script src="api-config.js?v=20260615f"></script>
  <script src="auth.js?v=20260615f"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <main class="login-container">
    <div class="login-card" style="padding: 48px 32px; text-align: center;">
      <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">Authenticating…</h2>
      <p style="font-size: 13px; color: var(--text-muted);" id="status-text">Completing sign-in</p>
    </div>
  </main>

  <script>
    function redirectAfterAuth() {
      const hasPending =
        sessionStorage.getItem("pendingCheckout") ||
        sessionStorage.getItem("autoCheckoutAfterLogin");
      window.location.href = hasPending ? "advertiser.html" : "index.html";
    }

    async function finishAuth(res) {
      const data = await res.json().catch(() => ({}));
      const statusEl = document.getElementById("status-text");

      if (res.ok && data.accessToken) {
        saveAuthToken(data.accessToken);
        statusEl.textContent = "Success! Redirecting…";
        redirectAfterAuth();
        return true;
      }

      statusEl.textContent = data.error || "Authentication failed. Redirecting…";
      setTimeout(() => { window.location.href = "index.html"; }, 2500);
      return false;
    }

    (async function handleCallback() {
      const statusEl = document.getElementById("status-text");
      const api = getHitbackApi();

      try {
        const query = new URLSearchParams(window.location.search);
        const tokenHash = query.get("token_hash");
        const confirmType = query.get("type");

        if (tokenHash && confirmType) {
          statusEl.textContent = "Confirming your email…";
          const res = await fetch(`${api}/auth/confirm`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ token_hash: tokenHash, type: confirmType }),
          });
          await finishAuth(res);
          return;
        }

        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get("access_token");
        const refreshToken = params.get("refresh_token");
        const hashError = params.get("error_description") || params.get("error");

        if (hashError) {
          statusEl.textContent = decodeURIComponent(hashError.replace(/\+/g, " "));
          setTimeout(() => { window.location.href = "index.html"; }, 3000);
          return;
        }

        if (!accessToken || !refreshToken) {
          statusEl.textContent = "Missing tokens. Redirecting…";
          setTimeout(() => { window.location.href = "index.html"; }, 2000);
          return;
        }

        statusEl.textContent = "Setting up session…";

        const res = await fetch(`${api}/auth/session`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({
            access_token: accessToken,
            refresh_token: refreshToken,
          }),
        });

        await finishAuth(res);
      } catch (err) {
        statusEl.textContent = "Network error. Redirecting…";
        console.error("[Auth Callback]", err);
        setTimeout(() => { window.location.href = "index.html"; }, 2000);
      }
    })();
  </script>
</body>
</html>
