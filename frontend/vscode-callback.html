<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VS Code Authentication — HitBack</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta name="hitback-api" content="https://api.hitback.xyz">
  <script src="api-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <main class="login-container" style="display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--bg-page);">
    <div class="card" style="padding: 48px 32px; max-width: 400px; text-align: center;">
      <img src="favicon.png" alt="HitBack" class="site-logo site-logo--lg" style="margin-bottom: 20px;">
      <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary);">Authentication Successful!</h2>
      <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 24px;" id="status-text">
        Redirecting you back to your editor...
      </p>
      
      <div id="manual-action" style="display: none;">
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">
          If your browser doesn't automatically prompt you to open your editor, click the button below.
        </p>
        <button id="open-vscode-btn" class="btn btn-blue btn-full">
          Open in Editor
        </button>
      </div>
    </div>
  </main>

  <script>
    /**
     * VS Code / Cursor OAuth callback — tokens in URL hash (implicit) or ?code= (PKCE).
     */
    (async function handleVSCodeCallback() {
      const statusEl = document.getElementById("status-text");
      const manualActionEl = document.getElementById("manual-action");
      const openBtn = document.getElementById("open-vscode-btn");
      const api = getHitbackApi();

      try {
        const query = new URLSearchParams(window.location.search);
        const queryError = query.get("error_description") || query.get("error");
        if (queryError) {
          statusEl.textContent = decodeURIComponent(queryError.replace(/\+/g, " "));
          statusEl.style.color = "red";
          return;
        }

        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        let accessToken = params.get("access_token");

        const oauthCode = query.get("code");
        if (!accessToken && oauthCode) {
          statusEl.textContent = "Completing sign-in…";
          const res = await fetch(`${api}/auth/exchange-code`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ code: oauthCode }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.accessToken) {
            statusEl.textContent = data.error || "Authentication failed. No token received.";
            statusEl.style.color = "red";
            return;
          }
          accessToken = data.accessToken;
        }

        if (!accessToken) {
          statusEl.textContent = "Authentication failed. No token received.";
          statusEl.style.color = "red";
          return;
        }

        const vscodeLink = `vscode://hitback.hitback-extension/auth-callback?token=${encodeURIComponent(accessToken)}`;
        const cursorLink = `cursor://hitback.hitback-extension/auth-callback?token=${encodeURIComponent(accessToken)}`;

        const preferredEditor = query.get("editor");
        const primaryLink = preferredEditor === "vscode" ? vscodeLink : cursorLink;
        const fallbackLink = preferredEditor === "vscode" ? cursorLink : vscodeLink;

        function openDeepLinks() {
          window.location.href = primaryLink;
          setTimeout(() => { window.location.href = fallbackLink; }, 600);
        }

        openDeepLinks();

        setTimeout(() => {
          manualActionEl.style.display = "block";
          statusEl.textContent = "You can safely close this browser tab.";
        }, 1500);

        openBtn.addEventListener("click", openDeepLinks);
      } catch (err) {
        statusEl.textContent = "An error occurred during authentication.";
        console.error(err);
      }
    })();
  </script>
  <script src="analytics.js"></script>
</body>
</html>
